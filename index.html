<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videobook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    #ui button {
      padding: 8px 20px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }
    #ui button:hover { background: rgba(255,255,255,0.25); }
    #scene-label {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: Georgia, serif;
      font-size: 18px;
      text-align: center;
      max-width: 600px;
      padding: 12px 24px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="scene-label">Loading scene...</div>
  <div id="ui">
    <button id="btn-prev">Previous Scene</button>
    <button id="btn-play">Play Audio</button>
    <button id="btn-next">Next Scene</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
